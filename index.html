<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nami — Interval Walking</title>
  <meta name="description" content="Nami is an iPhone app for the Japanese Interval Walking Training method.">
  <style>
    :root {
      --bg: #FAFAF7;
      --ink: #1A1A1A;
      --ink-subtle: #6B6B6B;
      --divider: #E8E6E0;
      --max-width: 720px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 17px;
      line-height: 1.55;
    }
    main {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 80px 24px;
      text-align: center;
    }
    .kanji {
      font-size: 88px;
      font-weight: 200;
      color: var(--divider);
      margin: 0;
      line-height: 1;
    }
    h1 {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: -1px;
      margin: 16px 0 8px;
    }
    .tagline {
      color: var(--ink-subtle);
      font-size: 15px;
      letter-spacing: 1.2px;
      text-transform: lowercase;
      margin: 0 0 40px;
    }
    .lead {
      color: var(--ink);
      max-width: 560px;
      margin: 0 auto 48px;
    }
    .links {
      margin-top: 48px;
      display: flex;
      gap: 32px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--ink);
      padding-bottom: 2px;
      font-size: 15px;
    }
    .footer {
      margin-top: 80px;
      color: var(--ink-subtle);
      font-size: 13px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #15171B;
        --ink: #EEEBE3;
        --ink-subtle: #9B9890;
        --divider: #2C2D32;
      }
    }
  </style>
</head>
<body>
<main>
  <p class="kanji">波</p>
  <h1>Nami</h1>
  <p class="tagline">walk in waves</p>
  <p class="lead">
    Nami guides you through Japanese Interval Walking Training on iPhone:
    five cycles of three minutes slow and three minutes fast. Quiet beeps and
    a lock-screen activity keep you on pace without staring at your phone.
  </p>
  <div class="links">
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
    <a href="mailto:hello@nami-walk.app">Contact</a>
  </div>
  <p class="footer">© 2026 Nami</p>
</main>
</body>
</html>
